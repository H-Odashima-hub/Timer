<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Timer ring -->
  <circle cx="256" cy="272" r="150" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="16"/>
  <!-- Progress arc (approximately 75%) -->
  <circle cx="256" cy="272" r="150" fill="none" stroke="#fff" stroke-width="16"
    stroke-linecap="round" stroke-dasharray="706.86 942.48"
    transform="rotate(-90 256 272)"/>
  <!-- Center time text -->
  <text x="256" y="290" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="72" font-weight="bold" fill="#fff">CT</text>
  <!-- Top button -->
  <rect x="240" y="92" width="32" height="40" rx="6" fill="rgba(255,255,255,0.8)"/>
</svg>
